name: Publish Python SDK

on:
  release:
    types: [published]

# Trusted publishing — no PYPI_TOKEN secret needed.
# One-time setup required on PyPI dashboard:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a new trusted publisher:
#      - PyPI project name:  certifieddata-agent-commerce
#      - Owner:              certifieddata
#      - Repository:         certifieddata-agent-commerce-public
#      - Workflow name:      publish-python.yml
#      - Environment name:   pypi
#   After that one-time step, this workflow publishes without any secrets.

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build sdist and wheel
        run: |
          cd packages/python-sdk
          python -m build

      - name: Check distribution
        run: |
          cd packages/python-sdk
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: packages/python-sdk/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password or token needed — trusted publishing handles auth.
        # If you need to publish to TestPyPI first, uncomment below:
        # with:
        #   repository-url: https://test.pypi.org/legacy/
